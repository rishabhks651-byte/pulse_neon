<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P U L S E N E O N // Uptime Monitor</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cyber-grid"></div>
  
  <header>
    <div class="logo-container">
      <h1 class="logo">PULSE<span>NEON</span></h1>
      <p class="subtitle">CYBERNETIC UPTIME ARCHITECTURE</p>
    </div>
    <div class="system-status">
      <span class="pulse-dot green"></span> SYSTEM OPERATIONAL
    </div>
  </header>

  <main>
    <section class="control-panel">
      <h2>// ADD_TARGET_TARGET</h2>
      <form id="monitor-form">
        <input type="text" id="url-input" placeholder="https://example.com" required>
        <button type="submit" class="neon-btn">INITIALIZE</button>
      </form>
    </section>

    <section class="monitors-section">
      <div class="section-header">
        <h2>// ACTIVE_CHANNELS</h2>
        <span id="target-count" class="badge">0 TARGETS</span>
      </div>
      <div id="monitors-grid" class="monitors-grid">
        </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 PULSENEON. SECURED & ENCRYPTED.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
